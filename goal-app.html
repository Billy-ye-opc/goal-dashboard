.r-fill {

}

.ti-check {

}
.today-item.done .ti-check { background: var(--accent); border-color: var(--accent); }
.ti-check-svg { opacity: 0; transition: opacity 0.15s; }

.ti-em { font-size: 14px; }

/* éˆ¹â‚¬éˆ¹â‚¬ Section Header éˆ¹â‚¬éˆ¹â‚¬ */

}

.ms-dot {

/* éˆ¹â‚¬éˆ¹â‚¬ Drawer / Sheet éˆ¹â‚¬éˆ¹â‚¬ */
.sheet-overlay {

  background: rgba(0,0,0,0.5);
  z-index: 900; align-items: flex-end; justify-content: center;
  backdrop-filter: blur(3px);
}
.sheet-overlay.open { display: flex; }
.sheet {
  background: var(--card);
  width: 100%; max-width: 480px;
  border-radius: 24px 24px 0 0;
  padding: 0 0 calc(var(--safe-bot) + 16px);
  max-height: 92dvh;
  display: flex; flex-direction: column;
  animation: sheetUp 0.32s cubic-bezier(0.16,1,0.3,1);

}
@keyframes sheetUp {

.form-group { margin-bottom: 14px; }
.form-label { font-size: 12px; font-weight: 600; color: var(--sub); margin-bottom: 5px; display: block; }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.range-wrap { display: flex; align-items: center; gap: 10px; }

}
.range-val { font-size: 14px; font-weight: 700; color: var(--accent); min-width: 36px; text-align: right; }

.sheet-footer {

.btn-danger { background: var(--danger-bg); color: var(--danger); }

/* éˆ¹â‚¬éˆ¹â‚¬ Context Menu éˆ¹â‚¬éˆ¹â‚¬ */
.ctx-menu {

}
@keyframes menuPop { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
.ctx-menu.open { display: block; }
.ctx-item {

}
.ctx-item:active { background: var(--track); }
.ctx-item.danger { color: var(--danger); }

/* éˆ¹â‚¬éˆ¹â‚¬ Stats Page éˆ¹â‚¬éˆ¹â‚¬ */

/* éˆ¹â‚¬éˆ¹â‚¬ Toast éˆ¹â‚¬éˆ¹â‚¬ */
.toast {
  position: fixed; bottom: calc(var(--safe-bot) + 90px); left: 50%; transform: translateX(-50%) translateY(20px);
  background: #111; color: #fff; padding: 10px 18px;
  border-radius: 20px; font-size: 13px; font-weight: 500;
  opacity: 0; transition: all 0.3s; z-index: 1000; pointer-events: none;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* éˆ¹â‚¬éˆ¹â‚¬ Empty State éˆ¹â‚¬éˆ¹â‚¬ */
.empty {
  text-align: center; padding: 40px 20px;
  color: var(--muted); font-size: 14px; line-height: 2;
}
.empty-icon { font-size: 48px; margin-bottom: 8px; }
</style>

function updateRing() {

  const circ = 2 * Math.PI * 39;

  fill.style.strokeDashoffset = circ - (pct / 100) * circ;
  animCount(document.getElementById('ringNum'), pct);
}
function animCount(el, to) {
  let from = parseInt(el.textContent) || 0;
  const dur = 800, start = performance.now();
  const step = now => {
    const p = Math.min((now - start) / dur, 1);
    el.textContent = Math.round(from + (to - from) * (1 - Math.pow(1 - p, 3))) + '%';
    if (p < 1) requestAnimationFrame(step);
  };
  requestAnimationFrame(step);
}

/* éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬ Checkin éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬ */
function checkin(id) {
  const g = goals.find(x => x.id === id);
  if (!g) return;
  if (g.doneToday) {
    g.doneToday = false;
    g.streak = Math.max(0, g.streak - 1);
    g.progress = Math.max(0, g.progress - 5);
    toast('ه®¸هڈ‰وŒ™é–؟â‚¬éژµو’³ه´±');
  } else {
    g.doneToday = true;
    g.streak += 1;
    g.progress = Math.min(100, g.progress + 5);
    if (g.progress >= 100) g.status = 'completed';
    else if (g.status === 'behind') g.status = 'in-progress';
    toast('éژµو’³ه´±éژ´و„¬ه§› é¦ƒه¸€ و‌©ç‚µç”» ' + g.streak + ' و¾¶â•‹ç´’');
  }
  save();
  renderAll();
}

/* éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬ Stats éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬ */
function renderStats() {
  const done = goals.filter(g => g.doneToday).length;
  const maxStreak = goals.reduce((m, g) => Math.max(m, g.streak), 0);
  const avgProgress = goals.length ? Math.round(goals.reduce((s, g) => s + g.progress, 0) / goals.length) : 0;
  const completed = goals.filter(g => g.status === 'completed').length;
  document.getElementById('statGrid').innerHTML = `
    <div class="stat-card"><div class="stat-num">${done}/${goals.length}</div><div class="stat-lbl">وµ ه©ƒو£©ç€¹ه±¾ه‍ڑ</div></div>
    <div class="stat-card"><div class="stat-num">${maxStreak}</div><div class="stat-lbl">éڈˆâ‚¬é—€èƒ¯ç¹›ç¼پî…‍مپ‰éڈپ?/div></div>
    <div class="stat-card"><div class="stat-num">${avgProgress}%</div><div class="stat-lbl">éھ‍ه†²و½ژو‌©و¶که®³</div></div>
    <div class="stat-card"><div class="stat-num">${completed}</div><div class="stat-lbl">ه®¸وڈ’ç•¬éژ´و„®و´°éڈچ?/div></div>`;
}

/* éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬ Tab Switch éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬ */
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('goalsSection').classList.toggle('hide', tab !== 'goals');
  document.getElementById('statsSection').classList.toggle('show', tab === 'stats');
  document.getElementById('navGoals').classList.toggle('active', tab === 'goals');
  document.getElementById('navStats').classList.toggle('active', tab === 'stats');
  if (tab === 'stats') { renderStats(); renderQuotes(); }
  document.getElementById('scrollArea').scrollTo({ top: 0, behavior: 'smooth' });
}

/* éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬ Toast éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬ */
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

/* éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬ Render All éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬ */
function renderAll() {
  renderToday();
  renderGoals();
  updateRing();
  if (currentTab === 'stats') renderStats();
}

/* éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬ Init éˆ¹â‚¬éˆ¹â‚¬éˆ¹â‚¬ */
load();
initTheme();
renderAll();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
